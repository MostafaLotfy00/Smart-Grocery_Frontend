<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg p-4" style="width: 100%; max-width: 400px; border-radius: 15px;">
    
    <div class="card-body">
      <h3 class="card-title text-center mb-4 fw-bold text-primary">Login</h3>

      <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center" role="alert">
        <small>{{ errorMessage }}</small>
      </div>

      <form (ngSubmit)="onLogin()">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" 
                 name="username" 
                 class="form-control form-control-lg" 
                 [(ngModel)]="loginData.username" 
                 placeholder="Enter username"
                 required>
        </div>

        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" 
                 name="password" 
                 class="form-control form-control-lg" 
                 [(ngModel)]="loginData.password" 
                 placeholder="********"
                 required>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">
          Login
        </button>
      </form>
    </div>
    
    <div class="card-footer bg-transparent border-0 text-center mt-2">
      <small class="text-muted">Smart Grocery</small>
    </div>
  </div>
</div>
